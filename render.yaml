# Render Blueprint (Infrastructure as Code)
# يُنشئ خدمة ويب (Node) + قاعدة بيانات PostgreSQL، ويربطهما تلقائياً عبر DATABASE_URL.
# عند ربط المستودع بـ Render واختيار "Blueprint"، يقرأ هذا الملف وينشئ كل شيء.

databases:
  - name: menu-intel-db
    plan: free            # عدّلها إلى starter أو أعلى للإنتاج
    databaseName: menuintel
    user: menuintel

services:
  - type: web
    name: menu-intelligence
    runtime: node
    plan: free            # عدّلها حسب الحاجة
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: menu-intel-db
          property: connectionString
      - key: NODE_VERSION
        value: "20"
