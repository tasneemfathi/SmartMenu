<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة ذكاء المنيو | Menu Intelligence Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6f9; --panel:#ffffff; --panel2:#f1f4f8; --line:#e3e8ef;
  --txt:#1a2433; --muted:#5f6b7c; --accent:#0f766e; --accent-soft:#e3f1ef;
  --green:#15803d; --red:#c0392b; --amber:#b7791f; --blue:#2563a8;
  --shadow:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.04);
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"IBM Plex Sans Arabic","Segoe UI",Tahoma,system-ui,Arial,sans-serif;background:var(--bg);color:var(--txt);direction:rtl;-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh}
/* Sidebar */
.sidebar{width:248px;background:var(--panel);border-left:1px solid var(--line);padding:20px 14px;position:sticky;top:0;height:100vh;flex-shrink:0}
.brand{display:flex;align-items:center;gap:11px;margin:4px 6px 2px}
.brand .logo{width:38px;height:38px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff}
.brand .logo svg{width:21px;height:21px}
.brand h1{font-size:15px;font-weight:700;line-height:1.25;letter-spacing:-.2px}
.brand small{color:var(--muted);font-size:10.5px;font-weight:500;letter-spacing:.3px}
.nav{margin-top:22px;display:flex;flex-direction:column;gap:2px}
.nav button{display:flex;align-items:center;gap:11px;background:none;border:none;color:var(--muted);padding:10px 12px;border-radius:7px;cursor:pointer;font-size:13.5px;font-weight:500;text-align:right;font-family:inherit;transition:.12s}
.nav button svg{width:18px;height:18px;flex-shrink:0;stroke-width:1.7}
.nav button:hover{background:var(--panel2);color:var(--txt)}
.nav button.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
.side-foot{position:absolute;bottom:16px;right:14px;left:14px;font-size:10.5px;color:var(--muted);border-top:1px solid var(--line);padding-top:12px;line-height:1.7}
/* Main */
.main{flex:1;padding:26px 32px;overflow-x:hidden;max-width:100%}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.page-head h2{font-size:22px;font-weight:700;letter-spacing:-.3px}
.page-head p{color:var(--muted);font-size:13px;margin-top:5px;max-width:700px;line-height:1.65}
.tag{background:var(--accent-soft);color:var(--accent);padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;border:1px solid #cfe5e1}
/* Cards */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.kpi .lbl{color:var(--muted);font-size:11px;margin-bottom:9px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.kpi .val{font-size:24px;font-weight:700;letter-spacing:-.5px}
.kpi .sub{font-size:12px;margin-top:6px;font-weight:500}
.up{color:var(--green)} .down{color:var(--red)}
.grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:18px}
.grid2-even{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:920px){.grid2,.grid2-even{grid-template-columns:1fr}}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:18px;box-shadow:var(--shadow)}
.panel h3{font-size:14.5px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:9px}
.panel h3 svg{width:17px;height:17px;color:var(--accent);stroke-width:1.7}
.panel .desc{color:var(--muted);font-size:12px;margin-bottom:14px;line-height:1.55}
canvas{max-width:100%}
.chart-wrap{position:relative;width:100%}
/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:11px 10px;text-align:right;border-bottom:1px solid var(--line)}
th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0;background:var(--panel)}
tr:hover td{background:#f8fafc}
.pill{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600}
.pill.g{background:#e6f4ea;color:var(--green)}
.pill.r{background:#fbeae8;color:var(--red)}
.pill.y{background:#fbf2e0;color:var(--amber)}
.pill.b{background:#e7f0fa;color:var(--blue)}
.bar-mini{height:6px;background:var(--panel2);border-radius:4px;overflow:hidden;margin-top:5px}
.bar-mini i{display:block;height:100%;border-radius:4px}
/* Recommendation cards */
.rec{background:var(--panel);border:1px solid var(--line);border-right:3px solid var(--accent);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap;box-shadow:var(--shadow)}
.rec.crit{border-right-color:var(--red)}
.rec.warn{border-right-color:var(--amber)}
.rec.opp{border-right-color:var(--green)}
.rec .r-title{font-weight:600;font-size:14px;margin-bottom:6px;display:flex;align-items:center;gap:9px}
.rec .r-title svg{width:17px;height:17px;flex-shrink:0;stroke-width:1.7}
.rec.crit .r-title svg{color:var(--red)} .rec.warn .r-title svg{color:var(--amber)} .rec.opp .r-title svg{color:var(--green)}
.rec .r-detail{color:var(--muted);font-size:13px;line-height:1.65;max-width:640px}
.rec .r-impact{text-align:left;min-width:130px}
.rec .r-impact .n{font-size:19px;font-weight:700;color:var(--green)}
.rec .r-impact .l{font-size:11px;color:var(--muted)}
.rec .r-act{margin-top:10px}
.btn{background:var(--accent);color:#fff;border:none;padding:8px 15px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:.12s;display:inline-flex;align-items:center;gap:7px}
.btn svg{width:15px;height:15px;stroke-width:1.8}
.btn:hover{background:#0c5e57}
.btn.ghost{background:var(--panel);color:var(--txt);border:1px solid var(--line)}
.btn.ghost:hover{background:var(--panel2)}
.btn.sm{padding:6px 11px;font-size:12px}
/* Sandbox */
.sb-grid{display:grid;grid-template-columns:380px 1fr;gap:18px}
@media(max-width:980px){.sb-grid{grid-template-columns:1fr}}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500}
select,input[type=number]{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:9px 10px;border-radius:6px;font-family:inherit;font-size:13px}
select:focus,input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
input[type=range]{width:100%;accent-color:var(--accent)}
.scenario-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.scn{display:flex;justify-content:space-between;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:9px 12px;font-size:12px}
.scn .x{cursor:pointer;color:var(--red);font-weight:700}
.delta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.delta{background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:13px 14px}
.delta .l{font-size:11px;color:var(--muted);font-weight:500}
.delta .v{font-size:18px;font-weight:700;margin-top:5px;letter-spacing:-.4px}
.delta .d{font-size:12px;margin-top:3px;font-weight:600}
.muted{color:var(--muted)} .small{font-size:12px}
.subtabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.subtabs button{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:7px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.subtabs button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.legend-note{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6}
.flow{font-size:12px;color:var(--txt);background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:13px 14px;line-height:1.95;margin-top:10px}
.flow b{color:var(--accent);font-weight:600}
.hidden{display:none}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#cdd5e0;border-radius:5px}::-webkit-scrollbar-thumb:hover{background:#b6c0cf}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V9M9 19V5M14 19v-7M19 19v-4"/><path d="M3 21h18" stroke-width="2"/></svg></div>
      <div><h1>ذكاء المنيو</h1><small>MENU INTELLIGENCE PLATFORM</small></div>

      <button data-page="costing"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="11" x2="9" y2="11"/><line x1="12" y1="11" x2="13" y2="11"/><line x1="16" y1="11" x2="16" y2="11"/><line x1="8" y1="15" x2="9" y2="15"/><line x1="12" y1="15" x2="13" y2="15"/><line x1="16" y1="15" x2="16" y2="18"/></svg> التكاليف والربحية</button>

      <button data-page="data"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/></svg> قاعدة البيانات</button>
    </nav>
    <div class="side-foot">
      ديمو توضيحي · بيانات مطعم برجر افتراضية<br>كل الأرقام محسوبة لحظياً من المحرّك
    </div>
  </aside>

  <main class="main" id="main"></main>
</div>

<script>
/* ============================================================
   1) نموذج البيانات  (Data Model)
   ============================================================ */
const SAR = n => (Math.round(n*100)/100).toLocaleString('en-US',{maximumFractionDigits:2})+' ر.س';
const SAR0 = n => Math.round(n).toLocaleString('en-US')+' ر.س';
const PCT = n => (n*100).toFixed(1)+'%';

  bulb:'<path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.4 1 2.3h6c0-.9.4-1.8 1-2.3A7 7 0 0 0 12 2Z"/>'
};
function ic(name){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${ICON_PATHS[name]||''}</svg>`;
}

const suppliers = [
  {id:'sup_meat',  name:'مورد اللحوم الذهبي', rating:4.6},
  {id:'sup_veg',   name:'مزارع الطازج للخضار', rating:4.2},

/* المكوّن: التكلفة لكل وحدة أساس + نسبة الفاقد التحضيري (yield loss) + موردون بدائل */

  {id:'beef',   name:'لحم بقري مفروم', unit:'كجم', supplierId:'sup_meat',  cost:46, wastePct:0.04, alts:[{supplierId:'sup_meat2',cost:41.5}]},

/* الوصفات الفرعية (Sub-recipes): وصفة تُنتَج ثم تدخل كمكوّن في منتجات أخرى */
const subRecipes = [
  {id:'sauce',    name:'الصوص الخاص', yieldQty:1, yieldUnit:'كجم',
    lines:[{ref:'mayo',qty:0.55},{ref:'ketchup',qty:0.30},{ref:'pickle',qty:0.10},{ref:'spice',qty:0.05}]},
  {id:'cookedfries', name:'بطاطا مقلية محضّرة', yieldQty:1, yieldUnit:'كجم',

  {id:'marinade', name:'تتبيلة الدجاج المقرمش', yieldQty:1, yieldUnit:'كجم',

const packaging = [
  {id:'box',   name:'علبة برجر', cost:0.55},
  {id:'fbag',  name:'كيس بطاطا', cost:0.30},
  {id:'cup',   name:'كوب مشروب', cost:0.40},
  {id:'msbag', name:'كوب ميلك شيك', cost:0.55},
  {id:'nap',   name:'مناديل + ساشيه', cost:0.15},
];

/* المنتجات: وصفة (مكوّن/وصفة فرعية) + تغليف + سعر بيع */
const products = [
  {id:'cheese_b', name:'تشيز برجر كلاسيك', cat:'برجر', price:21, freshness:0.7,
   recipe:[{ref:'beef',t:'ing',qty:0.13},{ref:'bun',t:'ing',qty:1},{ref:'cheese',t:'ing',qty:0.03},
           {ref:'lettuce',t:'ing',qty:0.02},{ref:'tomato',t:'ing',qty:0.03},{ref:'onion',t:'ing',qty:0.015},
           {ref:'sauce',t:'sub',qty:0.03}],
   pack:['box','nap']},

const subById = Object.fromEntries(subRecipes.map(s=>[s.id,s]));

/* ============================================================
   2) محرك التكاليف  (Costing Engine)
   كل دالة تقبل سياق تعديلات (ov) ليُعاد الحساب لحظياً في المحاكاة
   ============================================================ */
function ingUnitCost(ing, ov){
  if(ov && ov.supplierSwap && ov.supplierSwap[ing.id]!=null) return ov.supplierSwap[ing.id];
  if(ov && ov.ingPrice  && ov.ingPrice[ing.id]!=null)        return ov.ingPrice[ing.id];
  return ing.cost;
}
// التكلفة الفعلية لكل وحدة قابلة للاستخدام = السعر ÷ (1 − الفاقد)
function ingEffCost(ing, ov){ return ingUnitCost(ing,ov)/(1-ing.wastePct); }

function subCostPerUnit(sub, ov){
  let c=0;
  for(const ln of sub.lines) c += ingEffCost(ingById[ln.ref],ov)*ln.qty;
  return c/sub.yieldQty;
}
function productFoodCost(p, ov){
  let c=0;
  for(const ln of p.recipe){
    if(ln.t==='ing') c += ingEffCost(ingById[ln.ref],ov)*ln.qty;
    else             c += subCostPerUnit(subById[ln.ref],ov)*ln.qty;
  }
  return c;
}
function productPackCost(p){ return p.pack.reduce((s,id)=>s+packById[id].cost,0); }
function productTrueCost(p, ov){ return productFoodCost(p,ov)+productPackCost(p); }
function productPrice(p, ov){ return (ov&&ov.price&&ov.price[p.id]!=null)?ov.price[p.id]:p.price; }

// تفكيك المنتج إلى استهلاك مكوّنات أولية (يحلّ الوصفات الفرعية) — للوحدة الواحدة
function explodeIngredients(p){
  const map={};
  const add=(id,q)=>{map[id]=(map[id]||0)+q;};
  for(const ln of p.recipe){
    if(ln.t==='ing') add(ln.ref,ln.qty);
    else{ const sub=subById[ln.ref];
      for(const sl of sub.lines) add(sl.ref, sl.qty*ln.qty/sub.yieldQty);
    }
  }
  return map; // كمية قابلة للاستخدام لكل مكوّن
}
function productTotalUnits(pid){ return sales.filter(s=>s.productId===pid).reduce((a,s)=>a+s.monthly,0); }

/* ============================================================
   3) محرك الأرباح + مؤشرات الأداء  (P&L / KPIs)
   ============================================================ */
// تكلفة تشغيلية شهرية لكل صنف نشط في كل فرع (مخزون + تحضير + تدريب + تعقيد المنيو)
// تمثّل "تكلفة التعقيد التشغيلي" — الإبقاء على صنف في فرع له كلفة حتى لو هامشه موجب
const OP_COST_PER_LINE = 1400;
// يحسب الربحية لكل (منتج×فرع) مع تطبيق المرونة السعرية والإيقاف من المحاكاة
function computeRows(ov){
  ov = ov||{};
  const elastic = ov.elasticity!=null ? ov.elasticity : -1.2;
  const rows=[];
  for(const s of sales){
    const p=prodById[s.productId];
    const stoppedAll    = ov.stopped && ov.stopped.has(p.id);
    const stoppedBranch = ov.stopped && ov.stopped.has(p.id+'@'+s.branchId);
    let units=s.monthly;
    // استجابة الطلب لتغيّر السعر (مرونة)
    if(ov.price && ov.price[p.id]!=null && ov.useElasticity){
      const dP=(ov.price[p.id]-p.price)/p.price;
      units = Math.max(0, units*(1+elastic*dP));
    }
    if(stoppedAll||stoppedBranch) units=0;
    units=Math.round(units);
    const food=productFoodCost(p,ov), pack=productPackCost(p), tcost=food+pack;
    const price=productPrice(p,ov), margin=price-tcost;
    const wasteUnits=units*s.wastePct;              // وحدات حُضّرت وأُهدرت
    const wasteCost=wasteUnits*food;                // الهدر يكلّف الطعام لا التغليف
    const opCost=units>0?OP_COST_PER_LINE:0;        // تكلفة تشغيلية تُلغى عند إيقاف الصنف
    const revenue=units*price;
    const profit=units*margin - wasteCost - opCost;
    rows.push({pid:p.id,pname:p.name,cat:p.cat,bid:s.branchId,bname:supBranchName(s.branchId),
      units,price,food,pack,tcost,margin,marginPct:margin/price,wastePct:s.wastePct,
      wasteUnits,wasteCost,opCost,revenue,profit});
  }
  return rows;
}
function supBranchName(id){ return (branches.find(b=>b.id===id)||{}).name||id; }
function kpis(rows){
  const k={revenue:0,foodCost:0,packCost:0,wasteCost:0,opCost:0,profit:0,units:0};
  for(const r of rows){k.revenue+=r.revenue;k.foodCost+=r.food*r.units;k.packCost+=r.pack*r.units;
    k.wasteCost+=r.wasteCost;k.opCost+=r.opCost;k.profit+=r.profit;k.units+=r.units;}
  k.margin = k.revenue? k.profit/k.revenue : 0;
  return k;
}
const BASE_ROWS = computeRows();
const BASE_KPI  = kpis(BASE_ROWS);

/* ============================================================

// استهلاك المكوّنات الشهري على مستوى العمل كله (لتقييم المورّدين والهدر)
function monthlyIngredientUsage(){
  const usable={}, purchased={};
  for(const p of products){
    const total=productTotalUnits(p.id);
    const ex=explodeIngredients(p);
    for(const id in ex){
      const u=ex[id]*total;
      usable[id]=(usable[id]||0)+u;
      purchased[id]=(purchased[id]||0)+u/(1-ingById[id].wastePct);
    }
  }
  return {usable,purchased};
}
function recommendations(){
  const recs=[];
  const rows=BASE_ROWS;
  const usage=monthlyIngredientUsage();

  // (أ) إيقاف منتج بفرع (منهجية هندسة المنيو): صنف بطيء الحركة لا يغطّي تكلفته التشغيلية
  for(const r of rows){
    if(r.units===0) continue;
    if(r.profit<0){
      recs.push({sev:'crit',type:'إيقاف بفرع',
        title:`أوقف «${r.pname}» في ${r.bname}`,
        detail:`صافي الربح الشهري لهذا المنتج في هذا الفرع <b>سالب</b> (${SAR(r.profit)}). يبيع ${r.units} وحدة/شهر فقط (حركة بطيئة) وبهدر ${PCT(r.wastePct)}؛ مساهمة البيع لا تغطّي التكلفة التشغيلية للصنف (مخزون + تحضير + تعقيد منيو ≈ ${SAR0(OP_COST_PER_LINE)}/شهر). إيقافه في هذا الفرع يحسّن الربح ويبسّط التشغيل.`,
        impact:Math.abs(r.profit)+OP_COST_PER_LINE*0, unit:'ر.س/شهر توفير'});
    } else if(r.units<220 && r.profit<1500){
      recs.push({sev:'warn',type:'مراجعة بفرع',
        title:`راجع «${r.pname}» في ${r.bname}`,
        detail:`حركة بطيئة (${r.units} وحدة/شهر) وربح صافٍ ضئيل (${SAR(r.profit)}) بعد خصم التكلفة التشغيلية. الصنف في خانة «الكلب» بمصفوفة هندسة المنيو (شعبية منخفضة + ربح منخفض). يُقترح إيقافه أو دمجه أو رفع سعره لاختبار الطلب.`,
        impact:r.profit, unit:'ر.س/شهر فرصة'});
    }
  }

  // (ب) إيقاف منتج بساعات: منتجات حسّاسة للطزاجة + ساعات طلبها شبه معدوم → هدر تحضير
  const lowHours=[2,3,4,5];
  for(const p of products){
    if(p.freshness>0.55) continue; // فقط المنتجات سريعة التلف
    const ps=sales.filter(s=>s.productId===p.id);
    // ساعات الركود (نسبة من الذروة)
    const agg=new Array(24).fill(0);
    ps.forEach(s=>s.byHour.forEach((v,h)=>agg[h]+=v));
    const peak=Math.max(...agg);
    const deadHours=agg.map((v,h)=>({h,v})).filter(o=>o.v>0 && o.v<peak*0.12).map(o=>o.h);
    if(deadHours.length>=2){
      const total=productTotalUnits(p.id);
      const food=productFoodCost(p);
      const avgWaste=ps.reduce((a,s)=>a+s.wastePct,0)/ps.length;
      // الهدر المرتبط بالتحضير في ساعات الركود ≈ نصف هدر تلك الساعات
      const deadUnits=deadHours.reduce((a,h)=>a+agg[h],0);
      const save=deadUnits*food*avgWaste*1.8;
      recs.push({sev:'warn',type:'إيقاف بساعات',
        title:`أوقف تحضير «${p.name}» في ساعات الركود`,
        detail:`«${p.name}» منتج سريع التلف (طزاجة حرجة) وطلبه شبه معدوم في الساعات ${fmtHours(deadHours)}. الإبقاء على التحضير/العرض في هذه الفترات يولّد هدراً (متوسط هدر ${PCT(avgWaste)}). يُقترح إيقافه أو التحضير عند الطلب فقط خلالها.`,
        impact:save, unit:'ر.س/شهر توفير'});
    }
  }

  // (ج) استبدال مورّد: مكوّن له مورّد بديل أرخص
  for(const ing of ingredients){
    if(!ing.alts.length) continue;
    const best=ing.alts.reduce((a,b)=>b.cost<a.cost?b:a, ing.alts[0]);
    if(best.cost<ing.cost){
      const purchasedQty=usage.purchased[ing.id]||0;
      const save=(ing.cost-best.cost)*purchasedQty;
      if(save<50) continue;
      recs.push({sev:'opp',type:'استبدال مورّد',
        title:`استبدل مورّد «${ing.name}»`,
        detail:`المورّد الحالي «${supById[ing.supplierId].name}» بسعر ${SAR(ing.cost)}/${ing.unit}. المورّد البديل «${supById[best.supplierId].name}» يعرض ${SAR(best.cost)}/${ing.unit} (تقييم ${supById[best.supplierId].rating}). الاستهلاك الشهري ≈ ${Math.round(purchasedQty)} ${ing.unit}.`,
        impact:save, unit:'ر.س/شهر توفير'});
    }
  }

  // (د) تقليل الهدر: مكوّنات عالية الفاقد + استهلاك كبير
  const wasteList=ingredients.map(ing=>{
    const purchased=usage.purchased[ing.id]||0;
    const wasteQty=purchased*ing.wastePct;
    const wasteCost=wasteQty*ingUnitCost(ing,{});
    return {ing,wasteCost,wasteQty,purchased};
  }).sort((a,b)=>b.wasteCost-a.wasteCost);
  for(const w of wasteList.slice(0,3)){
    if(w.wasteCost<150) continue;
    recs.push({sev:'opp',type:'تقليل الهدر',
      title:`عالج هدر «${w.ing.name}»`,
      detail:`نسبة فاقد ${PCT(w.ing.wastePct)} على استهلاك ${Math.round(w.purchased)} ${w.ing.unit}/شهر تعني فقد ${Math.round(w.wasteQty)} ${w.ing.unit} بكلفة ${SAR(w.wasteCost)}. تحسين التخزين/المعايرة لتقليل الفاقد إلى النصف يوفّر نصف هذا المبلغ.`,
      impact:w.wasteCost*0.5, unit:'ر.س/شهر توفير'});
  }

  // (هـ) تحسين الربحية: منتج عالي المبيعات منخفض الهامش → رفع سعر بسيط
  const byProd={};
  rows.forEach(r=>{byProd[r.pid]=byProd[r.pid]||{name:r.pname,units:0,profit:0,price:r.price,margin:r.marginPct};
    byProd[r.pid].units+=r.units; byProd[r.pid].profit+=r.profit;});
  Object.values(byProd).forEach(o=>{
    if(o.units>3000 && o.margin<0.55){
      const bump=o.price*0.05; const extra=bump*o.units*0.85; // افتراض احتفاظ 85% بعد المرونة
      recs.push({sev:'opp',type:'تحسين الربحية',
        title:`ارفع سعر «${o.name}» 5% تجريبياً`,
        detail:`منتج عالي المبيعات (${o.units} وحدة/شهر) بهامش ${PCT(o.margin)}. زيادة سعرية بسيطة (+${SAR(bump)}) قابلة للامتصاص. جرّبها في Sandbox قبل التطبيق لقياس أثر المرونة.`,
        impact:extra, unit:'ر.س/شهر فرصة'});
    }
  });

  // ترتيب حسب الأثر
  return recs.sort((a,b)=>b.impact-a.impact);
}
function fmtHours(hrs){
  // تجميع ساعات متتالية
  const ranges=[]; let start=hrs[0],prev=hrs[0];
  for(let i=1;i<hrs.length;i++){ if(hrs[i]===prev+1){prev=hrs[i];} else {ranges.push([start,prev]);start=prev=hrs[i];} }
  ranges.push([start,prev]);
  return ranges.map(([a,b])=>a===b?`${pad(a)}:00`:`${pad(a)}:00–${pad(b+1)}:00`).join('، ');
}
const pad=n=>String(n).padStart(2,'0');

function renderCosting(){

function addScenario(){
  const kind=document.getElementById('sbKind').value;
  const f1=document.getElementById('f1'), f2=document.getElementById('f2');
  if(kind==='price'){
    const p=prodById[f1.value]; scenarios.push({kind,pid:p.id,price:+f2.value,
      label:`سعر «${p.name}»: ${SAR(p.price)} → ${SAR(+f2.value)}`});
  }else if(kind==='supplier'){
    const ing=ingById[f1.value]; scenarios.push({kind,iid:ing.id,cost:ing.alts[0].cost,
      label:`مورّد «${ing.name}» → ${supById[ing.alts[0].supplierId].name} (${SAR(ing.alts[0].cost)})`});
  }else if(kind==='ingprice'){
    const ing=ingById[f1.value], nc=ing.cost*(1+(+f2.value)/100);
    scenarios.push({kind,iid:ing.id,cost:nc,label:`تكلفة «${ing.name}»: ${SAR(ing.cost)} → ${SAR(nc)} (${f2.value>0?'+':''}${f2.value}%)`});
  }else{
    const p=prodById[f1.value], bid=f2.value;
    scenarios.push({kind,pid:p.id,bid,label:`إيقاف «${p.name}»${bid?(' في '+supBranchName(bid)):' (كل الفروع)'}`});
  }
  renderScenarios(); runSim();
}
function renderScenarios(){
  const el=document.getElementById('scnList'); if(!el)return;
  el.innerHTML = scenarios.length? scenarios.map((s,i)=>`<div class="scn"><span>${s.label}</span><span class="x" onclick="scenarios.splice(${i},1);renderScenarios();runSim()">✕</span></div>`).join('')
    : `<div class="small muted">لا سيناريو بعد — أضِف قراراً أعلاه لمشاهدة الأثر.</div>`;
}
function buildOverrides(){
  const ov={price:{},supplierSwap:{},ingPrice:{},stopped:new Set(),useElasticity:document.getElementById('sbElastic')?.checked};
  for(const s of scenarios){
    if(s.kind==='price') ov.price[s.pid]=s.price;
    else if(s.kind==='supplier') ov.supplierSwap[s.iid]=s.cost;
    else if(s.kind==='ingprice') ov.ingPrice[s.iid]=s.cost;
    else if(s.kind==='stop') ov.stopped.add(s.bid? s.pid+'@'+s.bid : s.pid);
  }
  return ov;
}
function runSim(){
  if(!document.getElementById('deltaGrid'))return;
  const ov=buildOverrides();
  const rows=computeRows(ov), k=kpis(rows), b=BASE_KPI;
  const d=(now,base)=>{const diff=now-base;const pct=base?diff/Math.abs(base)*100:0;
    const cls=diff>=0?'up':'down';return {diff,pct,cls};};
  const items=[
    ['صافي الربح',k.profit,b.profit,true],
    ['الإيرادات',k.revenue,b.revenue,true],
    ['تكلفة الطعام',k.foodCost,b.foodCost,false],
    ['كلفة الهدر',k.wasteCost,b.wasteCost,false],
    ['الوحدات',k.units,b.units,true],
  ];
  document.getElementById('deltaGrid').innerHTML=items.map(([l,now,base,goodUp])=>{
    const r=d(now,base); const good=goodUp? r.diff>=0 : r.diff<=0;
    const col=r.diff===0?'muted':(good?'up':'down');
    return `<div class="delta"><div class="l">${l}</div><div class="v">${l==='الوحدات'?Math.round(now).toLocaleString('en-US'):SAR0(now)}</div>
      <div class="d ${col}">${r.diff>=0?'▲ +':'▼ '}${l==='الوحدات'?Math.round(r.diff).toLocaleString('en-US'):SAR0(r.diff)} (${r.pct.toFixed(1)}%)</div></div>`;
  }).join('');
  // رسم مقارنة
  destroyCharts();
  charts.s=new Chart(document.getElementById('cSim'),{type:'bar',
    data:{labels:['صافي الربح','الإيرادات','تكلفة الطعام','كلفة الهدر'],
     datasets:[{label:'الحالي',data:[b.profit,b.revenue,b.foodCost,b.wasteCost].map(Math.round),backgroundColor:'#94a3b8'},
               {label:'بعد المحاكاة',data:[k.profit,k.revenue,k.foodCost,k.wasteCost].map(Math.round),backgroundColor:'#0f766e'}]},
    options:barOpts(true)});
  // جدول المنتجات الأكثر تأثّراً
  const baseByP={},nowByP={};
  BASE_ROWS.forEach(r=>baseByP[r.pid]=(baseByP[r.pid]||0)+r.profit);
  rows.forEach(r=>nowByP[r.pid]=(nowByP[r.pid]||0)+r.profit);
  const arr=products.map(p=>({name:p.name,base:baseByP[p.id]||0,now:nowByP[p.id]||0}))
    .map(o=>({...o,diff:o.now-o.base})).filter(o=>Math.abs(o.diff)>0.5)
    .sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
  document.getElementById('simTable').innerHTML = arr.length? `<table><thead><tr><th>المنتج</th><th>ربح حالي</th><th>ربح بعد المحاكاة</th><th>الفرق</th></tr></thead><tbody>${
    arr.map(o=>`<tr><td>${o.name}</td><td>${SAR0(o.base)}</td><td>${SAR0(o.now)}</td><td class="${o.diff>=0?'up':'down'}">${o.diff>=0?'+':''}${SAR0(o.diff)}</td></tr>`).join('')
  }</tbody></table>` : '<div class="small muted">لا تغيير — أضِف سيناريو لمشاهدة التأثير على المنتجات.</div>';
}

   <div class="grid2">
     <div class="panel"><h3>${ic('recycle')} كلفة الهدر حسب المكوّن</h3><div class="chart-wrap" style="height:300px"><canvas id="cWaste"></canvas></div></div>
     <div class="panel"><h3>${ic('tag')} تقييم المورّدين</h3><div class="desc">التقييم مقابل عدد المكوّنات المورّدة.</div><div class="chart-wrap" style="height:300px"><canvas id="cSup"></canvas></div></div>
   </div>
   <div class="panel"><h3>${ic('list')} تفصيل الهدر لكل مكوّن</h3>
     <div style="overflow:auto"><table><thead><tr><th>المكوّن</th><th>نسبة الفاقد</th><th>الشراء/شهر</th><th>المهدر/شهر</th><th>كلفة الهدر</th><th>مورّد بديل</th></tr></thead><tbody>${rows}</tbody></table></div>
   </div>`;
  charts.w=new Chart(cWaste,{type:'bar',data:{labels:list.slice(0,8).map(x=>x.ing.name),
    datasets:[{label:'كلفة الهدر (ر.س/شهر)',data:list.slice(0,8).map(x=>Math.round(x.wasteCost)),backgroundColor:'#c0392b'}]},
    options:barOpts()});
  const supCount={}; ingredients.forEach(i=>supCount[i.supplierId]=(supCount[i.supplierId]||0)+1);
  const supArr=suppliers.filter(s=>supCount[s.id]);
  charts.su=new Chart(cSup,{type:'bar',data:{labels:supArr.map(s=>s.name),
    datasets:[{label:'التقييم',data:supArr.map(s=>s.rating),backgroundColor:'#2563a8',yAxisID:'y'},
              {label:'عدد المكوّنات',data:supArr.map(s=>supCount[s.id]),backgroundColor:'#b7791f',yAxisID:'y'}]},
    options:barOpts(true)});
}

/* ---- قاعدة البيانات ---- */
function renderData(){
  let sub='ingredients';
  main.innerHTML=`
   <div class="page-head"><div><h2>قاعدة البيانات</h2>
     <p>الكيانات المترابطة التي يقوم عليها النظام: المكوّنات، الوصفات الفرعية، التغليف، المورّدون. (في النظام الفعلي تُدار بصلاحيات وتاريخ تغييرات.)</p></div></div>
   <div class="subtabs" id="dsub">
     <button data-s="ingredients" class="active">المكوّنات</button>
     <button data-s="subs">الوصفات الفرعية</button>
     <button data-s="pack">التغليف</button>
     <button data-s="sup">المورّدون</button>
     <button data-s="schema">مخطط العلاقات</button>
   </div>
   <div class="panel" id="dbody"></div>`;
  const draw=s=>{
    const el=document.getElementById('dbody');
    if(s==='ingredients'){
      el.innerHTML=`<div style="overflow:auto"><table><thead><tr><th>المكوّن</th><th>الوحدة</th><th>المورّد</th><th>السعر</th><th>الفاقد</th><th>تكلفة فعلية/وحدة</th><th>بدائل</th></tr></thead><tbody>${
        ingredients.map(i=>`<tr><td><b>${i.name}</b></td><td>${i.unit}</td><td>${supById[i.supplierId].name}</td><td>${SAR(i.cost)}</td><td>${PCT(i.wastePct)}</td><td>${SAR(ingEffCost(i))}</td><td>${i.alts.length?i.alts.map(a=>SAR(a.cost)).join('، '):'—'}</td></tr>`).join('')
      }</tbody></table></div>`;
    }else if(s==='subs'){
      el.innerHTML=subRecipes.map(sb=>`<div style="margin-bottom:16px"><b>${sb.name}</b> <span class="small muted">(ينتج ${sb.yieldQty} ${sb.yieldUnit} · التكلفة ${SAR(subCostPerUnit(sb))}/${sb.yieldUnit})</span>
        <table style="margin-top:6px"><thead><tr><th>المكوّن</th><th>الكمية</th><th>التكلفة</th></tr></thead><tbody>${
        sb.lines.map(l=>`<tr><td>${ingById[l.ref].name}</td><td>${l.qty} ${ingById[l.ref].unit}</td><td>${SAR(ingEffCost(ingById[l.ref])*l.qty)}</td></tr>`).join('')}</tbody></table></div>`).join('');
    }else if(s==='pack'){
      el.innerHTML=`<table><thead><tr><th>عنصر التغليف</th><th>التكلفة</th></tr></thead><tbody>${packaging.map(p=>`<tr><td>${p.name}</td><td>${SAR(p.cost)}</td></tr>`).join('')}</tbody></table>`;
    }else if(s==='sup'){
      el.innerHTML=`<table><thead><tr><th>المورّد</th><th>التقييم</th><th>المكوّنات المورّدة</th></tr></thead><tbody>${
        suppliers.map(su=>{const items=ingredients.filter(i=>i.supplierId===su.id||i.alts.some(a=>a.supplierId===su.id)).map(i=>i.name);
        return `<tr><td><b>${su.name}</b></td><td>⭐ ${su.rating}</td><td class="small muted">${items.join('، ')||'—'}</td></tr>`}).join('')
      }</tbody></table>`;
    }else{
      el.innerHTML=`<div class="flow" style="font-size:13px;line-height:2.2">
        <b>المورّد</b> ──يورّد──▶ <b>المكوّن</b> (سعر + فاقد)<br>
        <b>المكوّن</b> ──يدخل في──▶ <b>الوصفة الفرعية</b> (صوص، بطاطا محضّرة، تتبيلة)<br>
        <b>المكوّن + الوصفة الفرعية + التغليف</b> ──يكوّنون──▶ <b>المنتج</b> (سعر بيع)<br>
        <b>المنتج × الفرع × الساعة</b> ──يولّد──▶ <b>المبيعات</b> + <b>الإنتاج</b> + <b>الهدر</b><br>
        كل ذلك ──يُغذّي──▶ <b>محرّك التكاليف</b> → <b>محرّك التوصيات</b> → <b>المحاكاة</b>
      </div>
      <div class="legend-note">هذا المخطط هو جوهر قابلية التوسّع: أي تغيير في سعر مورّد ينتشر تلقائياً عبر الوصفات الفرعية إلى المنتجات إلى الربحية إلى التوصيات — بدون إعادة إدخال يدوي.</div>`;
    }
  };
  draw('ingredients');
  document.getElementById('dsub').addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b)return;
    document.querySelectorAll('#dsub button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); draw(b.dataset.s);
  });
}

/* خيارات الرسوم — حاويات بارتفاع ثابت لذا نوقف نسبة الأبعاد التلقائية */
function barOpts(legend){
  return {responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:!!legend,labels:{color:'#5f6b7c',font:{size:12},boxWidth:14,padding:14}},
      tooltip:{backgroundColor:'#1a2433',titleFont:{size:12},bodyFont:{size:12},padding:10}},
    scales:{x:{ticks:{color:'#5f6b7c',font:{size:12}},grid:{display:false}},
            y:{ticks:{color:'#5f6b7c',font:{size:11}},grid:{color:'#eef1f5'},border:{display:false}}}};
}

/* إقلاع */
render('overview');
</script>
</body>
</html>
